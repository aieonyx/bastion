name: BASTION CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run BASTION tests
        run: cargo test --test bastion_v01_tests -- --test-threads=1
      - name: Clippy
        run: cargo clippy -- -W warnings
